<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/e-icon.png" />
    <title>EvolveNXT | Next Generation Insurance Distribution Management</title>
    <meta
      name="description"
      content="EvolveNXT delivers a flexible suite of modular components that enables insurance carriers to modernize and optimize distribution management across the entire producer lifecycle."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Gate the reveal system: hiding is applied only under .motion, so
      // reduced-motion (and any pre-hydration state) renders everything
      // visible. Matches the approved mock.
      (function () {
        var d = document.documentElement
        d.className += ' js'
        try {
          if (!matchMedia('(prefers-reduced-motion: reduce)').matches) d.className += ' motion'
        } catch (e) {
          d.className += ' motion'
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
