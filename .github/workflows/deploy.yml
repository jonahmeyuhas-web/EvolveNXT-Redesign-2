name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://jonahmeyuhas-web.github.io/EvolveNXT-Redesign-2/
    steps:
      - uses: actions/configure-pages@v5
      # actions/deploy-pages intermittently returns "Deployment failed, try
      # again later" even when Pages is healthy. Retry up to three times so a
      # transient failure self-heals instead of needing a manual re-push.
      - id: try1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.try1.outcome == 'failure'
        run: sleep 20
      - id: try2
        if: steps.try1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        run: sleep 30
      - if: steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        uses: actions/deploy-pages@v4
